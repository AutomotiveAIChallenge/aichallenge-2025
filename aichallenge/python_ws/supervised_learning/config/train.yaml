model:
  name: tinylidarnet   # tinylidarnet / tinylidarnet_small
  input_dim: 1080
  output_dim: 2

dataset:
  root: ./datasets
  keys_to_load: ["scan", "control_cmd"]
  batch_size: 64
  num_workers: 4
  shuffle: true

transform:
  # --- LiDAR Scan Transform ---
  scan:
    max_range: 30.0
    normalize: true
    add_noise: false
    noise_std: 0.01

  # --- Image Transform ---
  image:
    resize: [224, 224]
    horizontal_flip: true
    flip_p: 0.0
    color_jitter: false
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

train:
  lr: 1e-4
  epochs: 50
  weight_decay: 1e-5
  log_interval: 20

save:
  ckpt_dir: ./ckpts/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
  log_dir:  ./logs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
