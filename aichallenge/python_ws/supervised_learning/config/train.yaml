model:
  name: tinylidarnet_small   # tinylidarnet / tinylidarnet_small
  input_dim: 1080
  output_dim: 2

dataset:
  h5_root: ./datasets
  keys_to_load: ["scan", "control_cmd"]
  len_key: "timestamp"
  batch_size: 64
  num_workers: 4
  shuffle: true

train:
  lr: 1e-4
  epochs: 50
  weight_decay: 1e-5
  log_interval: 20

save:
  ckpt_dir: ./ckpts/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
  log_dir:  ./logs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
